<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гостевая книга</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">📖 Гостевая Книга</a>
            <div class="navbar-nav ms-auto">
                {% if session.get('logged_in') %}
                    <span class="nav-link text-warning me-3">Вы вошли как admin</span>
                    <a class="btn btn-outline-danger btn-sm" href="/logout">Выйти</a>
                {% else %}
                    <a class="btn btn-outline-light btn-sm" href="/login">Войти</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/browser/bootstrap.bundle.min.js"></script>
</body>
</html>
